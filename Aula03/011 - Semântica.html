<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semântica</title>
</head>
<body>
    <header> <!-- Cabeçalho -->
        <h1>Meu site Semântico</h1>
        <p>Bem vindo ao meu site usando apenas HTML</p>
    </header>

    <nav> <!-- Área de navegação -->
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Produto</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <main> <!-- Conteúdo principal da página -->
        <section> <!-- Seção que agrupa conteúdos relacionados-->
            <h2>Sobre Nós</h2> 
            <article> <!-- Conteúdo independente da seção -->
                <h3>Nossa História</h3>
                <p>Nós começamos em 2020</p>
            </article>
        </section>
        <aside> <!-- Barra de informações complementares -->
            <h2>Notícias Recentes</h2>
            <p>Acompanhe as nossas notícias aqui</p>
        </aside>
    </main>

    <footer> <!-- -->
        <p>&copy; 2026 Todos os direitos reservado a João</p>
    </footer>
</body>
</html>
