<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Características de Textos</title>
</head>
<header>
    <p>Este é o meu cabeçalho</p>
</header>
<body>
    <p><b>Negrito</b></p>
    <p><u>Sublinhado</u></p>
    <p><i>Itálico</i></p>
    <p><big>Grande</big></p>
    <p><small>Pequeno</small></p>
    <p>Expressões: 
        x<sup>2</sup><br>
        x<sub>2</sub>
    </p>

    <h1>Cores e fonte</h1>
    <font color="green", face="arial">Este texto esta na cor verde e na fonte arial</font><br>
    <font color="purple", face="Courier New">Este texto esta na cor roxa e na fonte Courier New</font>
</body>
</html>
