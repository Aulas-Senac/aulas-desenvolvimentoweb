<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserção de Links HTML</title>
</head>

<body>
    <p>Links dentro do html são definidos com a tag "A" (Âncora).</p>

    <a href="https://www.sp.senac.br/">Visite o senac.</a>
    <br><br>

    <!-- Abre em uma nova guia -->
    <a href="https://www.sp.senac.br/" target="_blank">
        <button>Visite o senac.</button> </a>

    <br><br>

    <a href="https://www.sp.senac.br/">
        <img src="imagem-em-lente-convexa.webp" alt="imagem-em-lente-convexa" width="700" height="467">
    </a>
    <br><br>

    <!-- Botão com uso de propriedade com javascript -->
    <button onclick="document.location"= 'https://www.sp.senac.br/'>Conheça os cursos</button>


</body>
</html>
