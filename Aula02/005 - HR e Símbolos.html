<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hr e Símbolos</title>
</head>
<body>
    <h2>Seção 1</h2>
    <p>Este é o comando da primeira seção.</p>

    <!-- Linha horizontal  -->
    <hr> 

    <h2>Seção 2</h2>
    <p>Este é o comando da segunda seção.</p>

    <!-- Linha horizontal -->
    <hr>
    
    <p>Que bom que vai dar certo! <span>&#10084</span></p>
</body>
</html>
